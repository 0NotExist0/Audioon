<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <!-- Ottimizzazione per dispositivi mobili: disabilita lo zoom per sembrare un'app nativa -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HFAudio - Generatore AI</title>
    
    <!-- ========================================== -->
    <!-- CONFIGURAZIONE PWA (Progressive Web App)   -->
    <!-- ========================================== -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Collegamento al foglio di stile -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h2>Hugging Face TTS</h2>
        <p class="info-text">Inferenza Serverless senza carta di credito</p>
        
        <div class="input-group">
            <label for="apiKey">API Key Hugging Face (inizia con hf_)</label>
            <input type="password" id="apiKey" placeholder="hf_................................">
        </div>

        <div class="input-group">
            <label for="modelSelect">Seleziona Modello Open Source</label>
            <select id="modelSelect">
                <!-- Modelli gratuiti preimpostati -->
                <option value="facebook/mms-tts-ita">Facebook MMS (Italiano - Veloce)</option>
                <option value="suno/bark-small">Suno Bark Small (Multilingua - Lento)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="prompt">Testo da generare</label>
            <input type="text" id="prompt" placeholder="Scrivi qui il testo...">
        </div>

        <button id="generateBtn">Genera Audio</button>

        <div id="status-box"></div>
        <audio id="audioPlayer" controls></audio>
        
        <!-- Finestra della console UI per intercettare gli errori dal telefono -->
        <div class="console-container">
            <div class="console-header">Console Debugger</div>
            <div id="console-output"></div>
        </div>
    </div>

    <!-- Caricamento degli script logici -->
    <script src="logger.js"></script>
    <script src="script.js"></script>

    <!-- ========================================== -->
    <!-- REGISTRAZIONE SERVICE WORKER PER LA PWA    -->
    <!-- ========================================== -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker registrato con successo (Scope: ' + registration.scope + ')');
                    })
                    .catch(error => {
                        console.error('Registrazione Service Worker fallita:', error);
                    });
            });
        } else {
            console.log('I Service Worker non sono supportati in questo browser.');
        }
    </script>
</body>
</html>
